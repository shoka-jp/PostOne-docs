name: 不具合報告
description: PostOne の不具合を報告する
title: "[不具合] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 発生した問題
      description: どのような問題が起きたかを具体的に記載してください。
      placeholder: 例) 予約投稿が指定した時刻になっても配信されない
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題が発生するまでの操作手順を順番に記載してください。
      placeholder: |
        1. 新規投稿を作成する
        2. 予約日時を指定して保存する
        3. 指定時刻を過ぎても配信されない
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どう動くべきだと思うかを記載してください。
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 利用環境
      description: OS・ブラウザとそのバージョンを記載してください。
      placeholder: 例) Windows 11 / Chrome 138
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: スクリーンショット
      description: 問題がわかる画面キャプチャがあれば添付してください (個人情報は隠してください)。
    validations:
      required: false
